<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今晚吃啥 - 炭火小馆</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #111;
      --accent: #f59e0b;
      --text: #e5e7eb;
      --text2: #9ca3af;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .header {
      background: linear-gradient(to bottom, #1f2937, #111827);
      padding: 1.2rem 1rem;
      text-align: center;
    }
    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
      font-weight: 700;
    }
    .header p {
      font-size: 0.95rem;
      color: var(--text2);
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 1rem;
    }
    .category {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--accent);
      margin: 1.8rem 0 0.9rem;
      padding-left: 0.7rem;
      border-left: 4px solid var(--accent);
    }
    .item {
      display: flex;
      background: var(--card);
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
    }
    .item-img {
      width: 110px;
      height: 110px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .item-body {
      flex: 1;
      padding: 0.9rem 1rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .desc {
      font-size: 0.86rem;
      color: var(--text2);
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }
    .price {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
      align-self: flex-end;
    }
    .unit {
      font-size: 0.82rem;
      color: var(--text2);
    }
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      color: #6b7280;
      font-size: 0.85rem;
    }
    @media (max-width: 480px) {
      .item-img { width: 96px; height: 96px; }
      .item-body { padding: 0.8rem; }
      .name { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>炭火小馆</h1>
  <p>扫码查看今日菜单 · 价格含税</p>
</div>

<div class="container">

  <div class="category">招牌必点</div>
  <div class="item">
    <img class="item-img" src="https://i.imgur.com/8kXjPqL.jpeg" alt="雪花牛舌" loading="lazy">
    <div class="item-body">
      <div>
        <div class="name">雪花牛舌</div>
        <div class="desc">澳洲M7+薄切，炭火轻烤，嫩到入口即化</div>
      </div>
      <div class="price">38 <span class="unit">元/份</span></div>
    </div>
  </div>

  <div class="item">
    <img class="item-img" src="https://i.imgur.com/Q2vR9mX.jpeg" alt="和牛肋眼" loading="lazy">
    <div class="item-body">
      <div>
        <div class="name">A5和牛肋眼</div>
        <div class="desc">油花均匀，大理石纹理，烤至5分熟最香</div>
      </div>
      <div class="price">98 <span class="unit">元/100g</span></div>
    </div>
  </div>

  <div class="category">海鲜撸串</div>
  <div class="item">
    <img class="item-img" src="https://i.imgur.com/fvE3n4P.jpeg" alt="蒜蓉生蚝" loading="lazy">
    <div class="item-body">
      <div>
        <div class="name">蒜蓉粉丝生蚝</div>
        <div class="desc">澳洲生蚝肥美多汁，蒜香扑鼻</div>
      </div>
      <div class="price">18 <span class="unit">元/只</span></div>
    </div>
  </div>

  <div class="item">
    <img class="item-img" src="https://i.imgur.com/7mW9vZk.jpeg" alt="大虾" loading="lazy">
    <div class="item-body">
      <div>
        <div class="name">黑虎虾</div>
        <div class="desc">20-25只/斤，现烤刷酱</div>
      </div>
      <div class="price">8 <span class="unit">元/只</span></div>
    </div>
  </div>

  <div class="category">经典小食</div>
  <div class="item">
    <img class="item-img" src="https://i.imgur.com/3pL8xYt.jpeg" alt="烤茄子" loading="lazy">
    <div class="item-body">
      <div>
        <div class="name">蒜香辣烤茄子</div>
        <div class="desc">外焦里嫩，蒜蓉辣椒双倍满足</div>
      </div>
      <div class="price">16 <span class="unit">元/份</span></div>
    </div>
  </div>

  <div class="item">
    <img class="item-img" src="https://i.imgur.com/nR5kJ2v.jpeg" alt="烤冷面" loading="lazy">
    <div class="item-body">
      <div>
        <div class="name">韩式烤冷面</div>
        <div class="desc">酱香浓郁，鸡蛋火腿齐全</div>
      </div>
      <div class="price">18 <span class="unit">元/份</span></div>
    </div>
  </div>

</div>

<div class="footer">
  部分食材随市场波动，当日价格为准<br>
  欢迎扫码咨询或加群获取当日特价
</div>

</body>
</html>
